      - GEMINI_DEFAULT_MODEL=gemini-3-flash-preview
      - GEMINI_API_KEY=AIzaSyCaghCwHlT6dBI5dc2xGbnMewUkPeQRLq4
      - ULTRON_DISABLE_OLLAMA_LOCAL=1
      - ULTRON_DISABLE_ULTRON_INFER=1
      - ULTRON_DISABLE_OPENROUTER=1
      - ULTRON_DISABLE_DEEPSEEK=1
      - ULTRON_AUTONOMY_ENABLED=1
      - ULTRON_JUDGE_ENABLED=0
      - ULTRON_ROADMAP_ENABLED=0
      - ULTRON_AUTOFEEDER_ENABLED=1
      - ULTRON_REFLEXION_ENABLED=0
      - ULTRON_AGI_PATH_ENABLED=0
      - ULTRON_VOICE_PREWARM_ENABLED=0
      - ULTRON_AUTONOMY_BUDGET_PER_MIN=2
      - ULTRON_AUTONOMY_TICK_SEC=180
      - ULTRON_LIGHTRAG_CONCURRENCY=1
      - ULTRON_LLM_BLOCKING_CONCURRENCY=1
      - ULTRON_SELFPATCH_GATE_ENABLED=1
    networks:
      - Nutef
    volumes:
      - ultronpro_data:/app/data
    deploy:
      replicas: 1
      restart_policy:
        condition: on-failure

