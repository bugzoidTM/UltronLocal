version: '3.8'

services:
  ultronpro:
    image: ultronpro:phase4-lineage-20260319-171533
    ports:
      - target: 8000
        published: 8000
        protocol: tcp
        mode: host
    environment:
      - METACOG_QWEN_MAIN=0
      - ULTRON_PREFER_ULTRON_INFER=0
      - ULTRON_PRIMARY_LOCAL_PROVIDER=gemini
      - ULTRON_CANARY_PROVIDER=gemini
      - OLLAMA_BASE_URL_LOCAL=http://78.138.0.84:11434
      - ULTRON_INFER_MODEL_NAME=ultron_infer
      - ULTRON_OLLAMA_LOCAL_MODEL=ollama_local
      - GEMINI_DEFAULT_MODEL=gemini-3-flash-preview
      - GEMINI_API_KEY=AIzaSyCaghCwHlT6dBI5dc2xGbnMewUkPeQRLq4
      - ULTRON_DISABLE_OLLAMA_LOCAL=1
      - ULTRON_DISABLE_ULTRON_INFER=1
      - ULTRON_DISABLE_OPENROUTER=1
      - ULTRON_DISABLE_DEEPSEEK=1
      - ULTRON_LOCAL_INFER_URL=http://147.93.116.186:18025
      - ULTRON_LOCAL_INFER_TOKEN=TOKEN_FORTE_123
      - ULTRON_AUTONOMY_ENABLED=0
      - ULTRON_JUDGE_ENABLED=1
      - ULTRON_ROADMAP_ENABLED=0
      - ULTRON_AUTOFEEDER_ENABLED=1
      - ULTRON_REFLEXION_ENABLED=1
      - ULTRON_REFLEXION_TICK_SEC=900
      - ULTRON_AGI_PATH_ENABLED=0
      - ULTRON_PREWARM_ENABLED=0
      - ULTRON_VOICE_PREWARM_ENABLED=0
      - METACOG_LLM_ATTEMPT_TIMEOUT_SEC=25
      - METACOG_LLM_TOTAL_BUDGET_SEC=60
      - ULTRON_LLM_COMPAT_TIMEOUT_SEC=25
      - ULTRON_LLM_ROUTER_TIMEOUT_SEC=15
      - ULTRON_OLLAMA_TIMEOUT_SEC=25
      - ULTRON_LOCAL_INFER_TIMEOUT_SEC=18
      - ULTRON_LOCAL_INFER_RETRY_TIMEOUT_SEC=28
      - ULTRON_PROVIDER_FAILURE_COOLDOWN_SEC=180
      - ULTRON_GEMINI_FAILURE_COOLDOWN_SEC=15
      - ULTRON_AUTONOMY_BUDGET_PER_MIN=1
      - ULTRON_AUTONOMY_TICK_SEC=90
      - ULTRON_JUDGE_TICK_SEC=900
      - ULTRON_AUTOFEEDER_TICK_SEC=900
      - ULTRON_SELFPATCH_GATE_ENABLED=1
    networks:
      - Nutef
    volumes:
      - ultronpro_data:/app/data
    deploy:
      replicas: 1
      update_config:
        parallelism: 1
        order: stop-first
      restart_policy:
        condition: on-failure
      labels:
        - traefik.enable=1
        - traefik.http.routers.ultronpro.rule=Host(`ultronpro.nutef.com`)
        - traefik.http.routers.ultronpro.entrypoints=websecure
        - traefik.http.routers.ultronpro.tls.certresolver=letsencryptresolver
        - traefik.http.services.ultronpro.loadbalancer.server.port=8000
  ultronpro_autonomy:
    image: ultronpro:phase4-lineage-20260319-171533
    command: ["python", "-m", "ultronpro.autonomy_worker"]
    environment:
      - METACOG_QWEN_MAIN=0
      - ULTRON_PREFER_ULTRON_INFER=0
      - ULTRON_PRIMARY_LOCAL_PROVIDER=gemini
